# App-of-apps for observability components
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-components
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/dagster-platform
    targetRevision: main
    path: platform/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
