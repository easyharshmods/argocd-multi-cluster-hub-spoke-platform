# App-of-apps for core platform components
# Deploys ALB controller, External DNS, External Secrets, Metrics Server to all clusters
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-platform-components
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/dagster-platform
    targetRevision: main
    path: platform/core
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
