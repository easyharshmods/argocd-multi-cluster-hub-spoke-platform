apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dagster-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-staging-alerts
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_ORG/dagster-platform
    targetRevision: main
    path: platform/dagster/overlays/staging

  destination:
    name: dagster-staging
    namespace: dagster

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
