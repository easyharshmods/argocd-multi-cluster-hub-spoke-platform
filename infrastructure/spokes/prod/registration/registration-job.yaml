apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-registration
  namespace: kube-system
spec:
  template:
    spec:
      serviceAccountName: argocd-manager
      containers:
      - name: register
        image: amazon/aws-cli:latest
        command: ["/bin/bash", "/scripts/register.sh"]
        env:
        - name: ENVIRONMENT
          value: "prod"
        - name: HUB_ARGOCD_URL
          value: "https://argocd.example.com"
        - name: SPOKE_CLUSTER_NAME
          value: "dagster-prod"
        - name: HUB_CLUSTER_NAME
          value: "dagster-hub"
        - name: AWS_REGION
          value: "eu-central-1"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: registration-script
          defaultMode: 0755
      restartPolicy: OnFailure
  backoffLimit: 3
