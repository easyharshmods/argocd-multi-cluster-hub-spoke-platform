# ClusterSecretStore and ExternalSecret - placeholders; scripts/deploy-spoke.sh fills region and secret name.
# ClusterSecretStore uses IRSA (EXTERNAL_SECRETS_ROLE_ARN from infrastructure/shared).
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: REPLACE_AWS_REGION
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
---
# Fetches RDS credentials from AWS Secrets Manager and creates dagster-postgresql-secret.
# AWS secret name: dagster-platform-rds-credentials (from infrastructure/shared).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dagster-rds-credentials
  namespace: dagster
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: dagster-postgresql-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        postgresql-password: "{{ .password }}"
        DAGSTER_PG_HOST: "{{ .host }}"
        DAGSTER_PG_PORT: "{{ .port }}"
        DAGSTER_PG_USER: "{{ .username }}"
        DAGSTER_PG_PASSWORD: "{{ .password }}"
        DAGSTER_PG_DB: "{{ .dbname }}"
  dataFrom:
    - extract:
        key: REPLACE_RDS_SECRET_NAME
# REPLACE_RDS_SECRET_NAME = dagster-platform-rds-credentials (from infrastructure/shared)
