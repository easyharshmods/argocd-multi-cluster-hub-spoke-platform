apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dagster

resources:
  - ../../base

replicas:
  - name: dagster-webserver
    count: 2
  - name: dagster-daemon
    count: 1

# Replace AWS_ACCOUNT_ID and AWS_REGION before applying:
#   envsubst < kustomization.yaml | kubectl apply -f -
images:
  - name: dagster-user-code
    newName: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/dagster-user-code
    newTag: staging-latest

configMapGenerator:
  - name: dagster-config
    literals:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO

commonLabels:
  environment: staging
