apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dagster

resources:
  - ../../base

replicas:
  - name: dagster-webserver
    count: 1
  - name: dagster-daemon
    count: 1

images:
  - name: dagster-user-code
    newName: ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/dagster-user-code
    newTag: dev-latest

configMapGenerator:
  - name: dagster-config
    literals:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - ENVIRONMENT=dev
      - LOG_LEVEL=DEBUG

commonLabels:
  environment: dev
