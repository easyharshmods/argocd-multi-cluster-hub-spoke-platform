apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dagster

resources:
  - ../../base
  - resource-quota.yaml
  - limit-range.yaml

replicas:
  - name: dagster-webserver
    count: 3
  - name: dagster-daemon
    count: 2

# Replace AWS_ACCOUNT_ID and AWS_REGION before applying:
#   envsubst < kustomization.yaml | kubectl apply -f -
images:
  - name: dagster-user-code
    newName: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/dagster-user-code
    newTag: v1.2.3

configMapGenerator:
  - name: dagster-config
    literals:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO

commonLabels:
  environment: production
